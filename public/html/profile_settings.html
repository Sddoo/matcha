<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport"
	      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="stylesheet" href="../css/profile_settings.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
	<title>Document</title>
	<link rel="stylesheet" href="../../sass/profile_filling.sass">
</head>
<body>

	<!--header-->
	<div class="header-wrap" w3-include-html="modules/header.html"></div>

	<!--main-->
	<main class="main">
		<div class="main__inner">
			<div class="main__elem form">
				<div class="profile-form form__inner">
					<h1 class="header-1-level">Change your profile settings</h1>
					<div class="profile-form__field profile-form__field_height-auto">
						<h2 class="header-2-level">Login</h2>
						<form action="" method="POST" class="new-login-form">
							New login:
							<input type="text" name="login" class="text-input form__text-input">
							<button type="submit" name="submit_button" class="button form__button">Send</button>
						</form>
					</div>
					<div class="profile-form__field profile-form__field_height-auto">
						<h2 class="header-2-level">Password</h2>
						<form action="" method="POST" class="new-password-form">
							Current password:
							<input type="password" name="cur_password" class="text-input form__text-input">
							New password:
							<input type="password" name="new_password" class="text-input form__text-input">
							<button type="submit" name="submit_button" class="button form__button">Send</button>
						</form>
					</div>
					<div class="profile-form__field profile-form__field_height-auto">
						<h2 class="header-2-level">Email</h2>
						<form action="" method="POST" class="new-email-form">
							New email
							<input type="email" name="email" class="text-input form__text-input">
							<button type="submit" name="submit_button" class="button form__button">Send</button>
						</form>
					</div>
					<div class="profile-form__field profile-form__field_height-auto">
						<h2 class="header-2-level">Biography</h2>
						<form action="" method="POST" class="new-biography-form">
							Change biography
							<textarea name="biography" class="text-input form__text-input form__text-input_size-m"></textarea>
							<button type="submit" name="submit_button" class="button form__button">Send</button>
						</form>
					</div>
					<div class="profile-form__field profile-form__field_height-auto">
						<h2 class="header-2-level">Gender</h2>
						Change gender
						<form action="" method="POST" class="form new-gender-form">
							<div class="flex form__inner">
								<label class="radio profile-form__col">
									<input type="radio" class="radio__input" name="gender" value="male">
									<img class="radio__image" src="../assets/male.svg" alt="">
								</label>
								<label class="radio profile-form__col">
									<input type="radio" class="radio__input" name="gender" value="transgender">
									<img class="radio__image" src="../assets/transgender.svg" alt="">
								</label>
								<label class="radio profile-form__col">
									<input type="radio" class="radio__input" name="gender" value="female">
									<img class="radio__image" src="../assets/female.svg" alt="">
								</label>
							</div>
							<button type="submit" name="submit_button" class="button form__button">Send</button>
						</form>
					</div>
					<div class="profile-form__field profile-form__field_height-auto">
						<h2 class="header-2-level">Sexual preferences</h2>
						Change sexual preferences
						<form action="" method="POST" class="form new-preferences-form">
							<div class="flex form__inner">
								<label class="radio profile-form__col">
									<input type="radio" class="radio__input" name="sexual_preferences" value="heterosexual">
									<img class="radio__image" src="../assets/heterosexual.svg" alt="">
								</label>
								<label class="radio profile-form__col">
									<input type="radio" class="radio__input" name="sexual_preferences" value="homosexual">
									<img class="radio__image" src="../assets/lesbians.svg" alt="">
								</label>
								<label class="radio profile-form__col">
									<input type="radio" class="radio__input" name="sexual_preferences" value="bisexual">
									<img class="radio__image" src="../assets/bisexual.svg" alt="">
								</label>
							</div>
							<button type="submit" name="submit_button" class="button form__button">Send</button>
						</form>
					</div>
					<div class="profile-form__field profile-form__field_height-auto">
						<h2 class="header-2-level">City</h2>
						Change city
						<form action="" method="POST" class="new-position-form">
							<input type="text" name="city" class="text-input form__text-input">
							<button type="submit" name="submit_button" class="button form__button">Send</button>
						</form>
					</div>
				</div>
			</div>
		</div>
	</main>

	<!--footer-->
	<div class="footer-wrap" w3-include-html="modules/footer.html"></div>

</body>
<script src="../js/other.js"></script>
</html>
