<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport"
	      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="stylesheet" href="../css/profile.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
	<title>Profile</title>
</head>
<body>

	<!--header-->
	<div class="header-wrap" w3-include-html="modules/header.html"></div>

	<!--main-->
	<main class="main">
		<div class="main__inner main__inner_padding-3">
			<div class="main__elem profile">
				<div class="profile__image-wrap">
					<img src="../assets/my_image.jpg" alt="" class="profile__image profile__image_main">
					<div class="profile__image-list">
					</div>
				</div>
				<div class="profile__info">
					<h1 class="header-1-level profile__header">
						Vladislav Portnov
					</h1>
					<h2 class="header-2-level">Biography</h2>
					<div class="profile__biography"></div>
					<h2 class="header-2-level">Gender</h2>
					<div class="profile__gender"></div>
					<h2 class="header-2-level">Preferences</h2>
					<div class="profile__preferences"></div>
					<h2 class="header-2-level">Interests</h2>
					<div class="profile__interests"></div>
					<h2 class="header-2-level">Fame rating</h2>
					<div class="profile__interests"></div>
					<h2 class="header-2-level">City</h2>
					<div class="profile__interests"></div>
				</div>
			</div>
		</div>
	</main>

	<!--footer-->
	<div class="footer-wrap" w3-include-html="modules/footer.html"></div>

</body>
<script src="../js/other.js"></script>
<script src="../js/profile.js"></script>
</html>
