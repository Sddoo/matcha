<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Matcha</title>
    <link rel="stylesheet" href="css/index.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>
<body>

    <!--header-->
    <div w3-include-html="html/models/header.html"></div>

    <!--main content-->
    <div id="toggle_main">
        <div class="grid_container">
            <div class="grid_item">
                <h2>Log in</h2>
                <form action="" method="post">
                    <input type="text" name="login" placeholder="Write your login here"> <br>
                    <input type="password" name="password" placeholder="Write your password here"> <br>
                    <input type="submit" name="submit" value="OK">
                </form>
                <div class="register_link">Register</div>
                <div class="forgot_pass">Forgot password</div>
            </div>
            <div class="grid_item">
                <img src="images/lovers1.jpeg" alt="" class="main_image">
            </div>
        </div>
    </div>

    <!--login form-->
    <div id="toggle_register">
        <div class="register_wrap">
            <form action="" method="post">
                <input id="register_input_login" type="text" name="login" placeholder="Write your login here"> <br>
                <input id="register_input_pass" type="password" name="password" placeholder="Write your password here"> <br>
                <input id="register_input_email" type="email" name="email" placeholder="Write your email here"> <br>
                <input type="submit" name="submit" value="OK">
            </form>
            <div class="login_link">Back to login</div>
        </div>
    </div>

    <!--footer-->
    <div w3-include-html="html/models/footer.html"></div>

</body>
<script src="js/index.js"></script>
<script src="js/other.js"></script>
</html>
