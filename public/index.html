<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Matcha</title>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css?family=Amatic+SC&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <link rel="stylesheet" href="../sass/index.sass">
</head>
<body>

    <!--header-->
    <div class="header-wrap" w3-include-html="html/modules/header.html"></div>

    <!--main-->
    <main class="main">
        <div class="main__inner">
            <div class="site-welcome">
                <h1 class="header-1-level">WELCOME TO OUR COMMUNITY!</h1>
                <div class="site-welcome__text">Irure si laborum, noster singulis sed fugiat quae e ex sed quae dolore eram, Irure o excepteur et noster. Aut summis nam aute.</div>
                <button class="button site-welcome__register">Create an account</button>
                <button class="button site-welcome__login">Login</button>
            </div>
            <div class="form form_hidden">
                <form action="" method="POST" class="register-form">
                    <div class="form__inner">
                        <h2 class="header-2-level">Registration form</h2>
                        <label for="reg-login">Login</label>
                        <input type="text" id="reg-login" name="login" class="text-input form__text-input">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" name="password" class="text-input form__text-input">
                        <label for="reg-password_repeat">Repeat your password</label>
                        <input type="password" id="reg-password_repeat" name="password_repeat" class="text-input form__text-input">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" name="email" class="text-input form__text-input">
                        <button type="submit" name="submit_button" class="button form__button">Send</button>
                        <button type="button" class="button form__button button_back">Back to main page</button>
                    </div>
                </form>
            </div>
            <div class="form form_hidden">
                <form action="" method="POST" class="login-form">
                    <div class="form__inner">
                        <h2 class="header-2-level">Login form</h2>
                        <label for="log-login">Login</label>
                        <input type="text" id="log-login" name="login" class="text-input form__text-input">
                        <label for="log-password">Password</label>
                        <input type="password" id="log-password" name="password" class="form__text-input">
                        <button type="submit" name="submit_button" class="button form__button button_send"> Send </button>
                        <br>
                        <button type="button" class="button form__button login-form__recovery-button">Forgot password?</button>
                        <button type="button" class="button form__button button_back">Back to main page</button>
                    </div>
                </form>
            </div>
            <div class="form form_hidden">
            <form action="" method="POST" class="recovery-form">
                <div class="form__inner">
                    <h2 class="header-2-level">Recovery form</h2>
                    <label for="rec-login">Email to send recovery mail</label>
                    <input type="text" id="rec-login" name="email" class="form__text-input">
                    <button type="submit" name="submit_button" class="button form__button button_send"> Send </button>
                    <button type="button" class="button form__button button_back">Back to main page</button>
                </div>
            </form>
        </div>
        </div>
    </main>

    <!--footer-->
    <div class="footer-wrap" w3-include-html="html/modules/footer.html"></div>

</body>
<script src="js/other.js"></script>
<script src="js/index.js"></script>
</html>
